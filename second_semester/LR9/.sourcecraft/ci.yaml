on:
  push:
    - workflows: [lab-check]
      filter:
        branches: ["main", "master"]
  pull_request:
    - workflows: [lab-check]

workflows:
  lab-check:
    tasks:
      - name: run-notebook-and-build-report
        cubes:
          - name: execute-notebook
            image: docker.io/library/python:3.11
            script:
            # установка необходимых зависимостей
            - pip install -r requirements.txt
            # раннер дописывает ячейку с данными о среде выполнения
            - |
              python3 -c "
              import nbformat as nbf
              import os
              # Читаем исходный файл
              nb = nbf.read('lab.ipynb', as_version=4)
              # Собираем данные (если переменной нет, выведет 'Unknown')
              job_id = os.getenv('CI_JOB_ID', 'N/A')
              runner = os.getenv('CI_RUNNER_DESCRIPTION', 'Sourcecraft-Runner')
              # Текст штампа
              stamp = f'### Выполнено раннером\n**Job ID:** {job_id}\n**Runner Info:** {runner}'
              # Вставляем в самое начало
              nb.cells.insert(0, nbf.v4.new_markdown_cell(stamp))
              nbf.write(nb, 'lab.ipynb')
              "
            # выполнение кода и экспорт в разные форматы
            - jupyter nbconvert --to notebook --execute lab.ipynb --output executed_lab.ipynb
            - jupyter nbconvert --to html executed_lab.ipynb --output report.html
              
            # указываем файлы, которые хотим сохранить (пути должны совпадать с командами выше)
            artifacts:
              paths:
                - executed_lab.ipynb
                - report.html